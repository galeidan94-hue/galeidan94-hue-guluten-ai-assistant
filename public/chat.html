<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>המדריך שלנו - גולוטן</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #FFF8F0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    background: #1D9E75;
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header a { color: white; font-size: 13px; text-decoration: underline; }
  #msgs {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 15px; white-space: pre-wrap; }
  .user { align-self: flex-start; background: #fff; border: 1px solid #eee; }
  .bot { align-self: flex-end; background: #E1F5EE; color: #085041; }
  #inputrow {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #eee;
    background: #fff;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  #input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
  #send { background: #1D9E75; color: white; border: none; border-radius: 10px; padding: 0 20px; font-size: 15px; cursor: pointer; }
  #human { text-align: center; font-size: 12px; color: #888; padding: 6px 12px 14px; }
  #human a { color: #1D9E75; }
</style>
</head>
<body>
  <header>
    <h1>המדריך שלנו - גולוטן</h1>
    <a href="https://guluten.co.il/">חזרה לחנות</a>
  </header>
  <div id="msgs"></div>
  <div id="inputrow">
    <input id="input" type="text" placeholder="כתבו הודעה..." />
    <button id="send">שלח</button>
  </div>
  <div id="human">מעדיפים לדבר עם נציג אנושי? <a href="https://wa.me/972523030351" target="_blank" rel="noopener">לחצו כאן לוואטסאפ</a></div>

<script>
  const endpoint = '/api/chat';
  let history = [];
  const msgsEl = document.getElementById('msgs');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function linkify(text) {
    const escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    return escaped.replace(/(https?:\/\/[^\s<]+)/g, (url) => {
      const clean = url.replace(/[.,)\]]+$/, '');
      return `<a href="${clean}" target="_blank" rel="noopener">${clean}</a>`;
    });
  }

  function addMessage(who, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + (who === 'user' ? 'user' : 'bot');
    if (who === 'user') {
      el.innerText = text;
    } else {
      el.innerHTML = linkify(text);
    }
    msgsEl.appendChild(el);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    addMessage('user', text);
    history.push({ role: 'user', content: text });

    addMessage('bot', '...');
    const loadingEl = msgsEl.lastChild;

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });
      const data = await res.json();
      loadingEl.remove();

      if (data.reply) {
        addMessage('bot', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('bot', 'מצטערים, הייתה תקלה. נסו שוב מאוחר יותר.');
      }
    } catch (e) {
      loadingEl.remove();
      addMessage('bot', 'מצטערים, לא הצלחנו להתחבר לשרת.');
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

  addMessage('bot', 'שלום! איך אפשר לעזור? אפשר לשאול אותי על מוצרים, משלוחים, או אפילו לבקש מתכון :)');
</script>
</body>
</html>
